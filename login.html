<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Login - Haynes Consult</title>
  <link rel="icon" type="image/png" href="/hc.png" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { background: var(--body-bg); padding-top: 100px; }
    
    .login-hero {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      background: linear-gradient(160deg, #f0f8ff 0%, #e8f4fd 40%, #dceefb 100%);
    }
    
    .login-hero::before {
      content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(21,101,192,0.08) 0%, transparent 70%);
      top: -200px; right: -100px; pointer-events: none;
    }
    
    .login-hero::after {
      content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(21,101,192,0.05) 0%, transparent 70%);
      bottom: -150px; left: -100px; pointer-events: none;
    }

    .login-card { 
      background: #ffffff; 
      border: 1px solid rgba(13,43,126,0.06);
      padding: 56px 48px; 
      border-radius: 28px; 
      box-shadow: 0 32px 80px rgba(13,43,126,0.12); 
      display: flex; 
      flex-direction: column; 
      align-items: center;
      max-width: 460px;
      width: 90%;
      position: relative;
      z-index: 10;
      animation: fade-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    
    .login-card h2 { 
      font-family: var(--font-head); 
      color: var(--navy); 
      font-size: 36px; 
      font-weight: 900; 
      margin-bottom: 16px; 
      letter-spacing: -0.02em;
    }
    .login-card p { 
      color: rgba(13,43,126,0.65); 
      line-height: 1.6; 
      font-size: 15px;
      margin-bottom: 40px; 
    }
    
    .icon-wrapper {
      width: 64px; height: 64px;
      background: #eef5fc;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }

    @keyframes fade-in { 
      from { opacity: 0; transform: translateY(20px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
  </style>
</head>
<body>

  <!-- GLOBAL CURSOR ELEMENTS -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <!-- NAVIGATION -->
  <nav class="nav" id="nav">
    <div class="nav__container">
      <a href="/" class="nav__logo" id="navLogo">
        <img src="/hc.png" alt="Haynes Consult" class="nav__logo-img" />
        <span class="nav__logo-text">
          <span class="nav__logo-name">HAYNES</span>
          <span class="nav__logo-sub">CONSULT</span>
        </span>
      </a>
      <ul class="nav__links" id="navLinks">
        <li><a href="/" class="nav__link">Home</a></li>
        <li><a href="/academy.html" class="nav__link">Academy</a></li>
        <li><a href="/login.html" class="nav__link" style="color:var(--royal); font-weight:700;">Login</a></li>
      </ul>
      <a href="/#contact" class="nav__cta btn btn--primary">Get Started</a>
      <button class="nav__hamburger" id="hamburger" aria-label="Toggle Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="nav__mobile" id="mobileMenu">
    <button class="nav__mobile-close" id="mobileClose" aria-label="Close menu">&times;</button>
    <ul class="nav__mobile-links">
      <li><a href="/" class="nav__mobile-link">Home</a></li>
      <li><a href="/academy.html" class="nav__mobile-link">Academy</a></li>
      <li><a href="/login.html" class="nav__mobile-link" style="color:var(--royal); font-weight:700;">Login</a></li>
    </ul>
  </div>

  <!-- PUBLIC CUSTOMER LOGIN -->
  <div class="login-hero">
    <div class="login-card">
      <div class="icon-wrapper">
         <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--royal)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
      </div>
      <h2>Portal Login</h2>
      <p>Sign in with your Google account to access your cached profile and enable 1-Click checkouts across the platform.</p>
      
      <div id="g_id_onload"
         data-client_id="534598717647-kjbvv0ttare4gcc228cppi0el3050nrv.apps.googleusercontent.com"
         data-callback="handleGoogleResponse"
         data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="sign_in_with"
         data-shape="rectangular"
         data-logo_alignment="left">
      </div>
      <div id="loadingStatus" style="display:none; color:var(--royal); font-weight:700; margin-top:24px;">Authenticating your session...</div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
    /* Google JWT Auth Logic */
    function decodeJwtResponse(token) {
        let base64Url = token.split('.')[1];
        let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        let jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }

    function handleGoogleResponse(response) {
       document.querySelector('.g_id_signin').style.display = 'none';
       document.getElementById('loadingStatus').style.display = 'block';

       const responsePayload = decodeJwtResponse(response.credential);
       const verifiedEmail = responsePayload.email;
       const allowedAdmins = ["dogbeynathan7@gmail.com", "senyahmartin64@gmail.com"];

       // Set universal browser session for checkout
       localStorage.setItem('haynesUserEmail', verifiedEmail);

       // Stealth Router logic
       if (allowedAdmins.includes(verifiedEmail)) {
           localStorage.setItem('haynesAdmin', 'true');
           window.location.href = '/admin.html'; // Route instantly out to Dashboard
       } else {
           window.location.href = '/'; // Standard regular customer (Drop at Homepage)
       }
    }
  </script>
</body>
</html>
