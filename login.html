<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Login - Haynes Consult</title>
  <link rel="icon" type="image/png" href="/hc.png" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { 
      margin: 0; 
      padding-top: 100px; 
      background: #000;
      color: #fff;
    }
    
    /* Premium Video Background */
    .bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
      opacity: 0.8;
    }
    .bg-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(4, 12, 35, 0.7); /* Deep intense navy tint */
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: -1;
    }

    /* Glass Login Portal */
    .login-wrapper { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      min-height: 70vh; 
      text-align: center; 
      animation: fade-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    
    .glass-login-card {
      background: rgba(255, 255, 255, 0.05); 
      backdrop-filter: blur(30px); 
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.15); 
      padding: 56px 48px; 
      border-radius: 28px; 
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.05); 
      display: flex; 
      flex-direction: column; 
      align-items: center;
      max-width: 440px;
      width: 90%;
      position: relative;
      overflow: hidden;
    }
    
    .glass-login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    }

    .login-wrapper h2 { 
      font-family: var(--font-head); 
      color: #ffffff; 
      font-size: 34px; 
      font-weight: 900; 
      margin-bottom: 16px; 
      letter-spacing: -0.02em;
    }
    .login-wrapper p { 
      color: rgba(255, 255, 255, 0.7); 
      max-width: 380px; 
      line-height: 1.6; 
      font-size: 15px;
      margin-bottom: 40px; 
    }
    
    .icon-wrapper {
      width: 64px; height: 64px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    @keyframes fade-in { 
      from { opacity: 0; transform: translateY(20px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    
    /* Force Nav to adapt to dark background */
    .nav { background: transparent !important; }
    .nav.scrolled { background: rgba(4, 12, 35, 0.8) !important; backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .nav__link { color: rgba(255,255,255,0.8); }
    .nav__link:hover { color: #fff; }
    .nav__logo-name { color: #fff; }
    .nav__logo-sub { color: var(--sky); }
  </style>
</head>
<body>

  <!-- Cinematic Background -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="/heroo.mp4" type="video/mp4" />
  </video>
  <div class="bg-overlay"></div>

  <nav class="nav" id="nav">
    <div class="nav__container">
      <a href="/" class="nav__logo" id="navLogo">
        <img src="/hc.png" alt="Haynes Consult" class="nav__logo-img" />
        <span class="nav__logo-text">
          <span class="nav__logo-name">HAYNES</span>
          <span class="nav__logo-sub">CONSULT</span>
        </span>
      </a>
      <ul class="nav__links" id="navLinks">
        <li><a href="/" class="nav__link">Home</a></li>
        <li><a href="/academy.html" class="nav__link">Academy</a></li>
      </ul>
      <a href="/#contact" class="nav__cta btn btn--primary">Get Started</a>
    </div>
  </nav>

  <!-- PUBLIC CUSTOMER LOGIN -->
  <div class="login-wrapper">
    <div class="glass-login-card">
      <div class="icon-wrapper">
         <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
      </div>
      <h2>Portal Login</h2>
      <p>Sign in with your Google account to access your cached profile and enable 1-Click checkouts across the platform.</p>
      
      <div id="g_id_onload"
         data-client_id="534598717647-kjbvv0ttare4gcc228cppi0el3050nrv.apps.googleusercontent.com"
         data-callback="handleGoogleResponse"
         data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="sign_in_with"
         data-shape="rectangular"
         data-logo_alignment="left">
      </div>
      <div id="loadingStatus" style="display:none; color:var(--sky); font-weight:700; margin-top:24px;">Authenticating your session...</div>
    </div>
  </div>

  <script>
    /* Google JWT Auth Logic */
    function decodeJwtResponse(token) {
        let base64Url = token.split('.')[1];
        let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        let jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }

    function handleGoogleResponse(response) {
       document.querySelector('.g_id_signin').style.display = 'none';
       document.getElementById('loadingStatus').style.display = 'block';

       const responsePayload = decodeJwtResponse(response.credential);
       const verifiedEmail = responsePayload.email;
       const allowedAdmins = ["dogbeynathan7@gmail.com", "senyahmartin64@gmail.com"];

       // Set universal browser session for checkout
       localStorage.setItem('haynesUserEmail', verifiedEmail);

       // Navigation scroll logic for transparent nav
       window.addEventListener('scroll', () => {
         document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
       });

       // Stealth Router logic
       if (allowedAdmins.includes(verifiedEmail)) {
           localStorage.setItem('haynesAdmin', 'true');
           window.location.href = '/admin.html'; // Route instantly out to Dashboard
       } else {
           window.location.href = '/'; // Standard regular customer (Drop at Homepage)
       }
    }
  </script>
</body>
</html>
