<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Haynes Consult</title>
  <link rel="icon" type="image/png" href="/hc.png" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  
  <!-- SECURITY ENFORCER -->
  <script>
    if (localStorage.getItem('haynesAdmin') !== 'true') {
      window.location.href = '/login.html'; // Force redirect intruders immediately
    }
  </script>

  <style>
    body { background: var(--body-bg); padding-top: 100px; }
    
    .admin-hero {
      padding: 80px 20px 40px;
      text-align: center;
      background: linear-gradient(160deg, #f0f8ff 0%, #e8f4fd 40%, #dceefb 100%);
      position: relative;
      overflow: hidden;
      margin-bottom: -60px;
    }
    .admin-hero::before {
      content: ''; position: absolute; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(21,101,192,0.08) 0%, transparent 70%);
      top: -150px; right: -100px; pointer-events: none;
    }
    .admin-hero h1 { font-family: var(--font-head); color: var(--navy); font-weight: 900; font-size: clamp(32px, 5vw, 48px); margin-bottom: 12px; letter-spacing: -0.02em; }
    .admin-hero p { color: rgba(13,43,126,0.65); font-size: 16px; margin-bottom: 24px; max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.6; }

    .admin-container { 
      max-width: 1100px; 
      margin: 0 auto; 
      padding: 40px 20px 100px; 
      position: relative; 
      z-index: 10; 
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .admin-container { grid-template-columns: 1fr; }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(13,43,126,0.06), inset 0 1px 0 rgba(255,255,255,1);
      animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    
    .glass-card:nth-child(2) { animation-delay: 0.1s; }

    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-family: var(--font-head); font-weight: 700; color: var(--navy); font-size: 13px; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
    .form-group input[type="text"], .form-group input[type="number"], .form-group textarea { 
      width: 100%; padding: 16px 20px; background: rgba(255,255,255,0.7); border: 1px solid rgba(13,43,126,0.1); 
      border-radius: 12px; font-family: var(--font-body); font-size: 15px; outline: none; 
      transition: all 0.2s; color: var(--navy); 
    }
    .form-group input:focus, .form-group textarea:focus { 
      background: #fff; border-color: var(--royal); box-shadow: 0 0 0 4px rgba(21,101,192,0.1); 
      transform: translateY(-1px);
    }
    .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(13,43,126,0.3); }
    .form-group textarea { resize: vertical; min-height: 120px; }
    
    .file-drop { 
      border: 2px dashed rgba(21,101,192,0.2); border-radius: 12px; padding: 32px; 
      text-align: center; background: rgba(255,255,255,0.5); cursor: pointer; 
      transition: all 0.2s; 
    }
    .file-drop:hover { background: #fff; border-color: var(--royal); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(21,101,192,0.06); }
    .file-drop input[type="file"] { display: none; }
    .file-drop-text { color: var(--royal); font-family: var(--font-head); font-weight: 700; font-size: 13px; margin-top: 12px; }
    .file-list { margin-top: 14px; font-size: 13px; color: var(--navy); text-align: center; font-weight: 600; line-height: 1.6; }
    
    .btn-submit { 
      background: linear-gradient(135deg, var(--navy) 0%, var(--royal) 100%); color: white; border: none; 
      padding: 18px 40px; font-family: var(--font-head); font-weight: 800; border-radius: 50px; cursor: pointer; 
      font-size: 15px; margin-top: 12px; width: 100%; transition: all 0.3s; text-transform: uppercase; 
      letter-spacing: 0.05em; box-shadow: 0 8px 24px rgba(13,43,126,0.2); 
    }
    .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(21,101,192,0.3); }

    .admin-pill {
      display: inline-flex; align-items: center; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
      color: var(--navy); padding: 8px 16px; border-radius: 50px; font-size: 13px; font-weight: 600; 
      border: 1px solid rgba(13,43,126,0.1); box-shadow: 0 4px 12px rgba(13,43,126,0.05);
      animation: pulse-border 2s infinite;
    }
    
    @keyframes pulse-border {
      0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.3); }
      70% { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
      100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    }

    .course-item {
      display: flex; align-items: center; justify-content: space-between; padding: 20px; 
      background: #fff; border: 1px solid rgba(13,43,126,0.06); border-radius: 16px; 
      box-shadow: 0 4px 12px rgba(13,43,126,0.02);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      animation: fade-in-up 0.5s ease forwards;
      opacity: 0; transform: translateY(10px);
    }
    .course-item:hover {
      transform: translateY(-4px); box-shadow: 0 16px 32px rgba(13,43,126,0.08); border-color: rgba(21,101,192,0.15);
    }
    .btn-delete {
      background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); 
      padding: 8px 16px; border-radius: 50px; font-size: 11px; font-family: var(--font-head); font-weight: 800; 
      cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.1em;
    }
    .btn-delete:hover {
      background: #ef4444; color: #fff; transform: scale(0.95); box-shadow: 0 4px 12px rgba(239,68,68,0.3);
    }
    .btn-edit {
      background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2); 
      padding: 8px 16px; border-radius: 50px; font-size: 11px; font-family: var(--font-head); font-weight: 800; 
      cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.1em; margin-right: 8px;
    }
    .btn-edit:hover {
      background: #10b981; color: #fff; transform: scale(0.95); box-shadow: 0 4px 12px rgba(16,185,129,0.3);
    }
    @keyframes fade-in-up { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- GLOBAL CURSOR ELEMENTS -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <!-- NAVIGATION -->
  <nav class="nav" id="nav">
    <div class="nav__container">
      <a href="/" class="nav__logo" id="navLogo">
        <img src="/hc.png" alt="Haynes Consult" class="nav__logo-img" />
        <span class="nav__logo-text">
          <span class="nav__logo-name">HAYNES</span>
          <span class="nav__logo-sub">ADMIN</span>
        </span>
      </a>
      <ul class="nav__links" id="navLinks">
        <li><a href="/academy.html" class="nav__link">View Academy</a></li>
      </ul>
      <div class="admin-pill" style="margin-left: 12px; z-index: 100;">
        <span style="width:8px;height:8px;background:#10b981;border-radius:50%;margin-right:8px;box-shadow: 0 0 6px rgba(16,185,129,0.5);"></span> 
        Secure Session
        <button onclick="localStorage.removeItem('haynesAdmin'); localStorage.removeItem('haynesUserEmail'); window.location.href='/login.html';" style="margin-left: 14px; background: transparent; border: 1px solid var(--sky); border-radius: 40px; color: var(--royal); cursor: pointer; font-size: 11px; font-weight: 700; padding: 4px 12px; transition: background 0.2s;" onmouseover="this.style.background='#eef5fc'" onmouseout="this.style.background='transparent'">Sign Out</button>
      </div>
      <button class="nav__hamburger" id="hamburger" aria-label="Toggle Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  
  <div class="nav__mobile" id="mobileMenu">
    <button class="nav__mobile-close" id="mobileClose" aria-label="Close menu">&times;</button>
    <ul class="nav__mobile-links">
      <li><a href="/academy.html" class="nav__mobile-link">View Academy</a></li>
    </ul>
  </div>

  <div class="admin-hero">
    <h1 style="animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px);">Deploy New Course</h1>
    <p style="animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards; opacity: 0; transform: translateY(20px);">Upload a course, set the price, and attach premium PDFs to the Academy database.</p>
  </div>

  <!-- THE SECURE ADMIN DASHBOARD -->
  <div class="admin-container" id="adminDashboard">
    <!-- LEFT COLUMN: Form -->
    <div class="glass-card">
      <h2 id="formTitle" style="font-family: var(--font-head); font-weight: 800; font-size: 24px; color: var(--navy); margin-bottom: 24px; letter-spacing:-0.02em;">Course Details</h2>
      <form id="uploadCourseForm" onsubmit="handleUpload(event)">
        <div class="form-group">
          <label>Course Title</label>
          <input type="text" id="c_title" placeholder="e.g. Agency Growth Masterclass" required />
        </div>
        <div class="form-group">
          <label>Category (Meta Tag)</label>
          <input type="text" id="c_category" placeholder="e.g. Digital Marketing" required />
        </div>
        <div class="form-group">
          <label>Course Description</label>
          <textarea id="c_desc" placeholder="A compelling description of the value proposition..." required></textarea>
        </div>
        <div class="form-group">
          <label>Price (GHS)</label>
          <input type="number" id="c_price" value="150" required />
        </div>

        <div class="form-group">
          <label>Cover Photo (JPG/PNG)</label>
          <div class="file-drop" onclick="document.getElementById('c_cover').click()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--royal)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M20.4 14.5L16 10 4 20"/></svg>
            <div class="file-drop-text" id="cover_text">Click to browse cover image</div>
            <input type="file" id="c_cover" accept="image/*" onchange="updateFileText(this, 'cover_text')" required />
          </div>
        </div>

        <div class="form-group">
          <label>Course Materials (PDFs)</label>
          <div class="file-drop" onclick="document.getElementById('c_pdfs').click()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--royal)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <div class="file-drop-text" id="pdfs_text">Click to upload multiple PDFs</div>
            <input type="file" id="c_pdfs" accept="application/pdf" multiple onchange="updateFileText(this, 'pdfs_text')" required />
            <div class="file-list" id="pdf_list"></div>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Publish Course</button>
      </form>
    </div>

    <!-- RIGHT COLUMN: MANAGE COURSES SECTION -->
    <div class="glass-card">
      <h2 style="font-family: var(--font-head); font-weight: 800; font-size: 24px; color: var(--navy); margin-bottom: 24px; letter-spacing:-0.02em;">Manage Deployed Courses</h2>
      <div id="adminCourseList" style="display:flex; flex-direction:column; gap:16px;">
        <p style="color:var(--royal); font-size:14px; font-weight:600;">Loading courses...</p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
    /* Uploader Logic */
    function updateFileText(input, textId) {
      const el = document.getElementById(textId);
      if (input.files.length > 0) {
        el.textContent = input.files.length + ' file(s) selected';
        if(input.multiple) {
           const list = Array.from(input.files).map(f => f.name).join('<br/>');
           document.getElementById('pdf_list').innerHTML = list;
        }
      } else {
        el.textContent = 'Click to browse ' + (input.multiple ? 'multiple PDFs' : 'cover image');
        if(input.multiple) document.getElementById('pdf_list').innerHTML = '';
      }
    }

    const fetchApiBase = window.location.hostname === 'localhost' || window.location.hostname.includes('127.0.0.1') ? 'http://localhost:3001' : '';
    let editingCourseId = null;
    let loadedCourses = [];

    async function handleUpload(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.textContent = editingCourseId ? 'Saving...' : 'Uploading...';
      btn.disabled = true;

      // EDIT FLOW (PUT)
      if (editingCourseId) {
        const payload = {
          title: document.getElementById('c_title').value,
          category: document.getElementById('c_category').value,
          description: document.getElementById('c_desc').value,
          price: document.getElementById('c_price').value
        };
        try {
          const response = await fetch(fetchApiBase + '/api/admin/courses/' + editingCourseId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (response.ok) {
            alert('Course Details Updated!');
            cancelEdit();
            loadAdminCourses();
          } else {
            alert('Error updating course.');
          }
        } catch (err) {
          alert('Network error: ' + err.message);
        } finally {
          btn.textContent = 'Save Changes';
          btn.disabled = false;
        }
        return;
      }

      // UPLOAD FLOW (POST)
      const formData = new FormData();
      formData.append('title', document.getElementById('c_title').value);
      formData.append('category', document.getElementById('c_category').value);
      formData.append('description', document.getElementById('c_desc').value);
      formData.append('price', document.getElementById('c_price').value);
      
      const coverFile = document.getElementById('c_cover').files[0];
      formData.append('cover', coverFile);

      const pdfFiles = document.getElementById('c_pdfs').files;
      for (let i = 0; i < pdfFiles.length; i++) {
        formData.append('pdfs', pdfFiles[i]);
      }

      try {
        const fetchApiBase = window.location.hostname === 'localhost' || window.location.hostname.includes('127.0.0.1') ? 'http://localhost:3001' : '';
        const response = await fetch(fetchApiBase + '/api/admin/courses', {
          method: 'POST',
          body: formData
        });

        if (response.ok) {
          alert('Course successfully deployed to the Academy!');
          document.getElementById('uploadCourseForm').reset();
          document.getElementById('cover_text').textContent = 'Click to browse cover image';
          document.getElementById('pdfs_text').textContent = 'Click to browse multiple PDFs';
          document.getElementById('pdf_list').innerHTML = '';
        } else {
          alert('Error uploading course.');
        }
      } catch (err) {
        alert('Network error: ' + err.message);
      } finally {
        btn.textContent = 'Publish Course';
        btn.disabled = false;
        loadAdminCourses();
      }
    }

    async function loadAdminCourses() {
      try {
        const res = await fetch(fetchApiBase + '/api/courses');
        const courses = await res.json();
        loadedCourses = courses;
        const container = document.getElementById('adminCourseList');
        if (!container) return;
        
        if(courses.length === 0) {
          container.innerHTML = '<p style="color:rgba(13,43,126,0.5); font-size:14px;">No custom deployed courses found.</p>';
          return;
        }

        container.innerHTML = '';
        courses.forEach((course, index) => {
          const row = document.createElement('div');
          row.className = 'course-item';
          row.style.animationDelay = (index * 0.1) + 's';
          row.innerHTML = `
            <div style="flex:1;">
              <p style="font-weight:800; color:var(--navy); font-size:16px; margin-bottom:6px; font-family:var(--font-head);">${course.title}</p>
              <div style="display:flex; gap:12px; align-items:center;">
                <span style="background:rgba(21,101,192,0.1); color:var(--royal); font-size:11px; padding:4px 10px; border-radius:20px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">${course.category}</span>
                <span style="font-size:13px; color:rgba(13,43,126,0.6); font-weight:600;">GHS ${course.price / 100}</span>
              </div>
            </div>
            <div style="display:flex; gap: 8px;">
              <button class="btn-edit" onclick="editCourse(${course.id})">Edit</button>
              <button class="btn-delete" onclick="deleteCourse(${course.id})">Delete</button>
            </div>
          `;
          container.appendChild(row);
        });
      } catch(err) {
        console.error("Failed loading courses", err);
      }
    }

    async function deleteCourse(id) {
      if(!confirm("Are you sure you want to permanently delete this course?")) return;
      try {
        const res = await fetch(fetchApiBase + '/api/admin/courses/' + id, { method: 'DELETE' });
        if(res.ok) {
          loadAdminCourses();
        } else {
          alert('Failed to delete course');
        }
      } catch(err) {
        alert('Network error during deletion');
      }
    }

    function editCourse(id) {
      const course = loadedCourses.find(c => c.id === id);
      if(!course) return;
      editingCourseId = id;
      
      document.getElementById('c_title').value = course.title;
      document.getElementById('c_category').value = course.category;
      document.getElementById('c_desc').value = course.description;
      document.getElementById('c_price').value = course.price / 100;
      
      document.getElementById('formTitle').textContent = 'Editing: ' + course.title;
      
      // Disable file inputs for editing
      document.getElementById('c_cover').disabled = true;
      document.getElementById('c_pdfs').disabled = true;
      document.getElementById('cover_text').textContent = '(Cover replacement locked during Edit)';
      document.getElementById('pdfs_text').textContent = '(PDFs replacement locked during Edit)';
      
      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Save Changes';
      
      let cancelBtn = document.getElementById('cancelEditBtn');
      if(!cancelBtn) {
        cancelBtn = document.createElement('button');
        cancelBtn.type = 'button';
        cancelBtn.id = 'cancelEditBtn';
        cancelBtn.className = 'btn-edit';
        cancelBtn.style.marginLeft = '12px';
        cancelBtn.style.color = 'var(--navy)';
        cancelBtn.style.borderColor = 'rgba(13,43,126,0.2)';
        cancelBtn.style.background = 'transparent';
        cancelBtn.textContent = 'Cancel';
        cancelBtn.onclick = cancelEdit;
        btn.parentNode.appendChild(cancelBtn);
      }
      cancelBtn.style.display = 'inline-flex';
      
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function cancelEdit(e) {
      if(e) e.preventDefault();
      editingCourseId = null;
      document.getElementById('uploadCourseForm').reset();
      document.getElementById('formTitle').textContent = 'Course Details';
      
      document.getElementById('c_cover').disabled = false;
      document.getElementById('c_pdfs').disabled = false;
      document.getElementById('cover_text').textContent = 'Click to browse cover image';
      document.getElementById('pdfs_text').textContent = 'Click to browse multiple PDFs';
      
      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Publish Course';
      
      const cancelBtn = document.getElementById('cancelEditBtn');
      if(cancelBtn) cancelBtn.style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', loadAdminCourses);
  </script>
</body>
</html>
